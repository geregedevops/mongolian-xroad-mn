  contact:
    email: <<TBD: support@your-domain.com>>
    url: <<TBD: https://your-domain.com>>
  license:
    name: Proprietary
    url: <<TBD>>

servers:
  - url: https://api.<<TBD>>.com
    description: Production
  - url: https://sandbox.<<TBD>>.com
    description: Sandbox

tags:
  - name: <<tag1>>
    description: <<TBD: tag1 group тайлбар>>
  - name: <<tag2>>
    description: <<TBD>>
  - name: health
    description: Health checks

paths:

  ## ==============================================
  ## <<TBD: First group>>
  ## ==============================================

  /<endpoint>:
    post:
      tags: [<<tag1>>]
      summary: <<TBD: Endpoint-ийн зорилгийг 1 өгүүлбэрээр>>
      description: |
        <<TBD: Дэлгэрэнгүй тайлбар, edge cases>>
      security:
        - <<authScheme>>: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [<<TBD>>]
              properties:
                <<field1>>:
                  type: string
                  example: "<<TBD>>"
                <<field2>>:
                  type: integer
                  example: 0
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/<<TBD>>"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /<endpoint>/{id}:
    get:
      tags: [<<tag1>>]
      summary: <<TBD>>
      security:
        - <<authScheme>>: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/<<TBD>>"

  ## ==============================================
  ## Health
  ## ==============================================

  /health:
    get:
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: OK

  /ready:
    get:
      tags: [health]
      summary: Readiness probe (DB + dependencies)

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics

components:

  securitySchemes:

    BearerAPIKey:
      type: http
      scheme: bearer
      description: |
        <<TBD: Bearer token хэрхэн авах>>

    HMAC:
      type: apiKey
      description: |
        <<TBD: HMAC signing detail>>
      in: header
      name: X-Signature

    AdminJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256 signed JWT.

  responses:

    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Forbidden:
      description: Authenticated but not authorized

    NotFound:
      description: Resource not found

    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }

  schemas:

    Error:
      type: object
      properties:
        code: { type: integer, example: 400 }
        message: { type: string }
        request_id: { type: string }

    <<TBD: PrimaryEntity>>:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
