server {
    server_name ca.gerege.mn;

    client_max_body_size 20m;



    # OpenAPI3 specs for X-Road service publishing — public read.
    location /xroad/openapi/ {
        alias /opt/gerege-xroad-openapi/;
        default_type application/yaml;
        autoindex off;
    }

    # X-Road producer IS endpoint — only rp.gerege.mn (38.180.251.163) may inject SS trust token.
    # All other source IPs see /xroad/v1 as a normal proxied path with no token, so backend rejects.
    location /xroad/v1/ {
        if ($remote_addr != "38.180.251.163") {
            return 403 "X-Road IS endpoint restricted";
        }
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Gerege-SS-Token "REDACTED";  # rotated via XROAD_SS_TOKEN env in eid-gerege-backend/.env
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ca.gerege.mn-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ca.gerege.mn-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = ca.gerege.mn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name ca.gerege.mn;
    return 404; # managed by Certbot


}
