limit_req_zone $binary_remote_addr zone=tsa_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=tsa_page:10m rate=5r/s;

server {
    server_name timeserver.mn www.timeserver.mn;
    root /var/www/timeserver.mn;

    # Landing page
    location = / {
        limit_req zone=tsa_page burst=10 nodelay;
        try_files /index.html =404;
    }

    # robots.txt
    location = /robots.txt {
        try_files /robots.txt =404;
        access_log off;
    }

    # Static assets
    location /static/ {
        try_files $uri =404;
    }

    # API endpoints -> timestamp-authority
    location /api/ {
        limit_req zone=tsa_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 64k;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint for external monitoring
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3004/ping;
        proxy_set_header Host $host;
    }

    location = /ping {
        limit_req zone=tsa_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block common scanners
    location ~ \.(sqlite|env|git|php|asp|jsp)$ {
        return 444;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/timeserver.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timeserver.mn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = www.timeserver.mn) {
        return 301 https://$host$request_uri;
    }
    if ($host = timeserver.mn) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name timeserver.mn www.timeserver.mn;
    return 404;
}

