server {
    listen 80;
    server_name tsa.timeserver.mn;
    location /.well-known/acme-challenge/ { root /var/www/tsa-acme; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name tsa.timeserver.mn;

    ssl_certificate /etc/letsencrypt/live/tsa.timeserver.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tsa.timeserver.mn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root POST → timestamp-authority /api/v1/timestamp
    location = / {
        limit_req zone=tsa_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3004/api/v1/timestamp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 64k;
    }

    # Pass through other paths
    location / {
        limit_req zone=tsa_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 64k;
    }
}
